[project]
name = "website-with-login"
version = "0.1.0"
description = "A minimal Flask website with OIDC login"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "authlib>=1.3.0",
    "flask>=3.0.0",
    "gunicorn>=23.0.0",
    "requests>=2.32.0",
]

[build-system]
requires = ["uv_build<0.11"]
build-backend = "uv_build"

[project.scripts]
website-with-login = "website_with_login.app:main"

[dependency-groups]
dev = [
    "pytest",
    "ruff",
]

[tool.uv]
package = true

[tool.ruff]
line-length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--verbose"
