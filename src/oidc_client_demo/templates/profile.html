<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Profile</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
        --background: #f8f6f2;
        --surface-soft: #efebe4;
        --text: #30312e;
        --muted: #707369;
        --border: #ddd6cb;
        --accent: #6d8c7d;
        --accent-strong: #4f6f62;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        width: min(100% - 2rem, 50rem);
        margin: 0 auto;
        padding: 4.5rem 0;
      }

      .hero {
        padding-bottom: 2.25rem;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 1rem;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(2.5rem, 8vw, 4.25rem);
        font-weight: 500;
        line-height: 1;
      }

      .lede {
        max-width: 42rem;
        margin-bottom: 0;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .profile-details {
        padding: 2rem 0;
      }

      dt {
        margin: 0 0 0.35rem;
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      dd {
        margin: 0;
        color: var(--muted);
        font-size: 1.08rem;
      }

      a {
        color: var(--accent-strong);
        font-weight: 650;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 2.25rem;
        padding: 0.42rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--accent-strong);
        font-weight: 650;
        text-decoration: none;
      }

      .button:hover {
        border-color: var(--accent);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --background: #1f211e;
          --surface-soft: #2a2d28;
          --text: #eee9df;
          --muted: #c8bfb1;
          --border: #45483f;
          --accent: #9bb8a8;
          --accent-strong: #bfd8c9;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">OIDC session</p>
        <h1>Your profile</h1>
        <p class="lede">This page is protected and rendered from the OIDC session.</p>
      </section>
      <section class="profile-details" aria-labelledby="profile-details-title">
        <h2 id="profile-details-title" hidden>Profile details</h2>
        <dl>
          <dt>Email</dt>
          <dd>{{ user.email or "Not provided" }}</dd>
        </dl>
      </section>
      <section class="actions" aria-label="Profile actions">
        <a class="button" href="{{ url_for('home') }}">Back home</a>
        <a class="button" href="{{ url_for('logout') }}">Sign out</a>
      </section>
    </main>
  </body>
</html>
