<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/site.css') }}">
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Info about logged in user</p>
        <h1>Your profile</h1>
        <p class="lede">This page only available to logged in users. The email is passed from the identity provider as part of the oidc login</p>
      </section>
      <section class="profile-details" aria-labelledby="profile-details-title">
        <h2 id="profile-details-title" hidden>Profile details</h2>
        <dl>
          <dt>Email</dt>
          <dd>{{ user.email or "Not provided" }}</dd>
        </dl>
      </section>
      <section class="actions" aria-label="Profile actions">
        <a class="button" href="{{ url_for('home') }}">Back home</a>
        <a class="button" href="{{ url_for('logout') }}">Sign out</a>
      </section>
    </main>
  </body>
</html>
