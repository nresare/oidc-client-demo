<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>oidc-client-demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
        --background: #f8f6f2;
        --surface-soft: #efebe4;
        --text: #30312e;
        --muted: #707369;
        --border: #ddd6cb;
        --accent: #6d8c7d;
        --accent-strong: #4f6f62;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        width: min(100% - 2rem, 50rem);
        margin: 0 auto;
        padding: 4.5rem 0;
      }

      .hero {
        padding-bottom: 2.25rem;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 1rem;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-size: clamp(2.5rem, 8vw, 4.25rem);
        font-weight: 500;
        line-height: 1;
      }

      .lede {
        max-width: 42rem;
        margin-bottom: 0;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 2rem 0 0;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        min-height: 2.25rem;
        padding: 0.42rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--accent-strong);
        font-weight: 650;
        text-decoration: none;
      }

      a.button:hover {
        border-color: var(--accent);
      }

      .meta {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --background: #1f211e;
          --surface-soft: #2a2d28;
          --text: #eee9df;
          --muted: #c8bfb1;
          --border: #45483f;
          --accent: #9bb8a8;
          --accent-strong: #bfd8c9;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">OIDC client demo</p>
        <h1>Small starlette site, real login</h1>
        {% if user %}
          <p class="lede">You are signed in.</p>
          <div class="actions">
            <a class="button" href="{{ url_for('profile') }}">View profile</a>
            <a class="button" href="{{ url_for('logout') }}">Sign out</a>
          </div>
        {% else %}
          <p class="lede">The purpose of this site is to illustrate the OpenId Connect (OIDC) protocol for logins.</p>
          <div class="actions">
            <a class="button" href="{{ url_for('login') }}">Sign in with OIDC</a>
          </div>
        {% endif %}
        <p class="meta">Current UTC time: {{ now.isoformat() }}</p>
      </section>
    </main>
  </body>
</html>
